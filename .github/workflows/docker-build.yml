# Reusable Docker Build Workflow
# Equivalent to docker-build-pipe for Bitbucket
#
# Builds images using docker buildx bake and pushes them straight to prod
# Harbor (registry.landcareresearch.co.nz). Per-target build metadata is
# attached as an OCI artifact (oras attach) and the build-index pushed as a
# tagged OCI artifact under the `builds` project for downstream deploys.
#
# Artifactory push retired (Phase 5, DEVENV-9681). The legacy registry_*
# inputs / ARTIFACTORY_TOKEN secret are kept defined but no longer drive a
# push - they remain only so existing caller repos don't break, and so a
# Dockerfile can still pull an Artifactory base at build time via BAKE_SECRETS.

name: Docker Build

on:
  workflow_call:
    inputs:
      bake_file:
        description: 'Path to docker-bake.hcl file'
        type: string
        default: docker-bake.hcl
      bake_target:
        description: 'Bake target(s) to build'
        type: string
        default: default
      image_name:
        description: 'Image name in registry (defaults to repo name)'
        type: string
        default: ''
      platforms:
        description: 'Target platforms (comma-separated)'
        type: string
        default: linux/amd64
      image_namespace:
        description: 'Image namespace in registry'
        type: string
        default: mwlr-private
      push:
        description: 'Push images to registry'
        type: boolean
        default: true
      registry_host:
        description: 'Legacy Artifactory hostname (no longer a push target; kept for caller compat / optional build-time base pulls)'
        type: string
        required: false
        default: artifactory.landcareresearch.co.nz
      registry_username:
        description: 'Legacy Artifactory username (unused by the push; kept for caller compat)'
        type: string
        required: false
        default: ''
      runs_on:
        description: 'Runner to use (ubuntu-latest for GitHub-hosted, tak-k8s-ci for self-hosted K8s)'
        type: string
        default: 'ubuntu-latest'
      buildkit_endpoint:
        description: 'Central BuildKit endpoint for persistent cache (self-hosted K8s only)'
        type: string
        default: 'tcp://buildkit.buildkit.svc.cluster.local:1234'
      # ----- Harbor (the primary and only push registry) -----
      push_to_harbor:
        description: 'DEPRECATED / no-op. Harbor is now the sole push target; kept for caller compat.'
        type: boolean
        default: true
      harbor_host:
        description: 'Harbor hostname (internal only - needs self-hosted runner)'
        type: string
        default: registry.landcareresearch.co.nz
      harbor_username:
        description: 'Harbor robot account name (e.g. robot$github-builder)'
        type: string
        default: ''
    secrets:
      ARTIFACTORY_TOKEN:
        required: false
        description: 'Legacy Artifactory identity token (no longer used for the push; optional build secret via BAKE_SECRETS)'
      BAKE_SECRETS:
        required: false
        description: 'Build secrets in docker secret format'
      REGISTRY_CA_CERT:
        required: false
        description: 'CA certificate for registry TLS verification (PEM format)'
      HARBOR_TOKEN:
        required: false
        description: 'Harbor robot account token. Effectively required - this is the push credential (workflow_call cannot mark it conditionally required).'
    outputs:
      build_id:
        description: 'Build identifier (run_number-sha)'
        value: ${{ jobs.build.outputs.build_id }}
      image_tag:
        description: 'Image tag'
        value: ${{ jobs.build.outputs.image_tag }}
      registry_prefix:
        description: 'Registry prefix for images'
        value: ${{ jobs.build.outputs.registry_prefix }}
      metadata_url:
        description: 'Harbor OCI ref of the build-index artifact (builds/<namespace>/<image>:<build_id>)'
        value: ${{ jobs.build.outputs.metadata_url }}

jobs:
  build:
    runs-on: ${{ inputs.runs_on }}
    outputs:
      build_id: ${{ steps.vars.outputs.build_id }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      registry_prefix: ${{ steps.vars.outputs.registry_prefix }}
      metadata_url: ${{ steps.harbor.outputs.metadata_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build variables
        id: vars
        run: |
          # Build ID matches Bitbucket convention: build_number-commit_sha
          BUILD_ID="${{ github.run_number }}-${GITHUB_SHA}"
          REPO_NAME="${{ github.event.repository.name }}"
          
          # Use custom image_name if provided, otherwise default to repo name
          IMAGE_NAME="${{ inputs.image_name }}"
          if [[ -z "$IMAGE_NAME" ]]; then
            IMAGE_NAME="${REPO_NAME}"
          fi
          
          # Push target is now prod Harbor: ${harbor_host}/${namespace}/${image}
          # (the project == namespace; no Artifactory `/docker/` path segment).
          REGISTRY_PREFIX="${{ inputs.harbor_host }}/${{ inputs.image_namespace }}/${IMAGE_NAME}"
          
          echo "build_id=${BUILD_ID}" >> $GITHUB_OUTPUT
          echo "image_tag=${BUILD_ID}" >> $GITHUB_OUTPUT
          echo "registry_prefix=${REGISTRY_PREFIX}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          
          # For bake file interpolation
          echo "REGISTRY_PREFIX=${REGISTRY_PREFIX}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${BUILD_ID}" >> $GITHUB_ENV
          echo "GIT_ORIGIN=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_ENV
          echo "GIT_REVISION=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Install registry CA certificate
        id: ca-cert
        env:
          REGISTRY_CA_CERT: ${{ secrets.REGISTRY_CA_CERT }}
          REGISTRY_HOST: ${{ inputs.harbor_host }}
        run: |
          if [[ -z "$REGISTRY_CA_CERT" ]]; then
            echo "No CA certificate provided, skipping"
            echo "has_ca_cert=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_ca_cert=true" >> $GITHUB_OUTPUT
          
          # Add CA to system trust store
          echo "$REGISTRY_CA_CERT" | sudo tee /usr/local/share/ca-certificates/registry-ca.crt > /dev/null
          sudo update-ca-certificates
          
          # Add CA to Docker daemon cert store for registry access
          # This is used by docker login and docker pull/push
          sudo mkdir -p "/etc/docker/certs.d/${REGISTRY_HOST}"
          echo "$REGISTRY_CA_CERT" | sudo tee "/etc/docker/certs.d/${REGISTRY_HOST}/ca.crt" > /dev/null
          
          # Store the cert for later injection into BuildKit
          echo "$REGISTRY_CA_CERT" > /tmp/registry-ca.crt
          
          # Restart Docker daemon to pick up new certificates (only on systemd hosts)
          # DinD runners don't have systemd - certs.d works without restart
          if command -v systemctl &>/dev/null && systemctl is-system-running &>/dev/null; then
            echo "Restarting Docker daemon..."
            sudo systemctl restart docker
            sleep 5
            docker info > /dev/null 2>&1
          else
            echo "No systemd available (DinD mode), skipping daemon restart"
            # Docker certs.d directory works without restart for registry operations
          fi
          
          # Verify TLS connection works
          echo "Testing TLS connection to ${REGISTRY_HOST}..."
          curl -v --cacert /usr/local/share/ca-certificates/registry-ca.crt "https://${REGISTRY_HOST}/v2/" 2>&1 | head -50 || true
          
          echo "✓ CA certificate installed for ${REGISTRY_HOST}"

      # Try central BuildKit first (self-hosted K8s runners only)
      # This provides persistent layer + image cache for faster builds
      - name: Try central BuildKit
        id: central-buildkit
        if: inputs.runs_on != 'ubuntu-latest'
        continue-on-error: true
        run: |
          ENDPOINT="${{ inputs.buildkit_endpoint }}"
          BUILDER_NAME="central-buildkit"
          
          echo "Trying central BuildKit at ${ENDPOINT}..."
          
          # Clean up any existing builder
          docker buildx rm "${BUILDER_NAME}" 2>/dev/null || true
          
          # Create builder with remote driver
          if ! docker buildx create \
            --name "${BUILDER_NAME}" \
            --driver remote \
            "${ENDPOINT}"; then
            echo "connected=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Verify connection
          if docker buildx inspect --bootstrap "${BUILDER_NAME}" >/dev/null 2>&1; then
            docker buildx use "${BUILDER_NAME}"
            echo "connected=true" >> $GITHUB_OUTPUT
            echo "✓ Connected to central BuildKit (persistent cache)"
          else
            docker buildx rm "${BUILDER_NAME}" 2>/dev/null || true
            echo "connected=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # Fall back to docker-container driver if central BuildKit unavailable
      # BuildKit in docker-container driver runs in an isolated container.
      # We set up the builder first, then inject the CA cert into the container.
      - name: Set up Docker Buildx (fallback)
        if: steps.central-buildkit.outcome != 'success'
        id: buildx-setup
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      # Inject CA cert into BuildKit container's trust store (only for docker-container driver)
      - name: Configure BuildKit CA certificate
        if: steps.ca-cert.outputs.has_ca_cert == 'true' && steps.central-buildkit.outcome != 'success'
        run: |
          # Get the BuildKit container name
          BUILDKIT_CONTAINER=$(docker ps --filter "name=buildx_buildkit" --format "{{.Names}}" | head -1)
          
          if [[ -z "$BUILDKIT_CONTAINER" ]]; then
            echo "ERROR: BuildKit container not found"
            docker ps -a
            exit 1
          fi
          
          echo "Found BuildKit container: ${BUILDKIT_CONTAINER}"
          
          # Append the CA certificate directly to the CA bundle inside the container
          # BuildKit uses Alpine which has certs at /etc/ssl/certs/ca-certificates.crt
          docker cp /tmp/registry-ca.crt "${BUILDKIT_CONTAINER}:/tmp/registry-ca.crt"
          docker exec "$BUILDKIT_CONTAINER" sh -c 'cat /tmp/registry-ca.crt >> /etc/ssl/certs/ca-certificates.crt'
          
          # Restart buildkitd to pick up the new CA bundle
          docker restart "$BUILDKIT_CONTAINER"
          
          # Wait for buildkitd to be ready
          sleep 5
          
          echo "✓ CA certificate configured in BuildKit container"

      - name: Login to Harbor
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.harbor_host }}
          username: ${{ inputs.harbor_username }}
          password: ${{ secrets.HARBOR_TOKEN }}

      - name: Build and push
        id: bake
        uses: docker/bake-action@v5
        with:
          files: ${{ inputs.bake_file }}
          targets: ${{ inputs.bake_target }}
          push: ${{ inputs.push }}
          provenance: true
          sbom: true
          set: |
            *.platform=${{ inputs.platforms }}
            *.cache-from=type=registry,ref=${{ steps.vars.outputs.registry_prefix }}:cache
        env:
          REGISTRY_PREFIX: ${{ steps.vars.outputs.registry_prefix }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}

      - name: Parse bake metadata
        id: parse
        run: |
          # Extract metadata from bake output
          BAKE_METADATA='${{ steps.bake.outputs.metadata }}'
          
          # Create index.json matching docker-build-pipe format
          echo "$BAKE_METADATA" | jq '{
            build_id: "${{ steps.vars.outputs.build_id }}",
            git_origin: "${{ github.server_url }}/${{ github.repository }}",
            git_revision: "${{ github.sha }}",
            git_ref: "${{ github.ref }}",
            timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
            outputs: [
              to_entries[] | {
                target: .key,
                digest: .value."containerimage.digest",
                image: (.value."image.name" // "" | split(",") | .[0])
              }
            ]
          }' > build-index.json
          
          echo "Build index:"
          cat build-index.json

      - name: Upload build-index as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-index
          path: build-index.json
          retention-days: 90

      # ----- Harbor build metadata (images already pushed by bake) -----
      # bake pushed each target straight to Harbor (REGISTRY_PREFIX is Harbor),
      # so there is nothing to copy. Attach each target's build metadata to its
      # already-pushed image as an OCI artifact, and push the build-index as a
      # tagged OCI artifact under the `builds` project for downstream deploys.
      # Self-hosted runner required - Harbor is internal-only.
      - name: Install oras
        if: inputs.push
        env:
          ORAS_VERSION: 1.2.2
        run: |
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Attach metadata + push build-index
        id: harbor
        if: inputs.push
        env:
          HARBOR_HOST: ${{ inputs.harbor_host }}
          BAKE_METADATA: ${{ steps.bake.outputs.metadata }}
          IMAGE_NAME: ${{ steps.vars.outputs.image_name }}
          BUILD_ID: ${{ steps.vars.outputs.build_id }}
          HARBOR_BUILDS_PROJECT: builds
        run: |
          set -euo pipefail

          # bake metadata is a JSON object keyed by target name; each target has
          # containerimage.digest + image.name (comma-separated tag list). Names
          # are already Harbor refs (REGISTRY_PREFIX == Harbor).
          echo "$BAKE_METADATA" > bake.json

          mapfile -t TARGETS < <(jq -r 'keys[]' bake.json)
          HARBOR_REFS=()

          for target in "${TARGETS[@]}"; do
            digest=$(jq -r --arg t "$target" '.[$t]."containerimage.digest" // empty' bake.json)
            names=$(jq -r --arg t "$target" '(.[$t]."image.name" // "" | split(",") | map(gsub("^\\s+|\\s+$"; "")) | join(" "))' bake.json)
            [[ -z "$digest" || -z "$names" ]] && continue

            # First tag (sans :tag) is the repository the metadata attaches to.
            primary=""
            for ref in $names; do primary="${ref%:*}"; break; done
            [[ -z "$primary" ]] && continue

            subject="${primary}@${digest}"
            jq --arg t "$target" '.[$t]' bake.json > "target-${target}.json"
            echo "attach metadata: ${subject}"
            oras attach \
              --artifact-type application/vnd.landcareresearch.build-metadata+json \
              --distribution-spec v1.1-referrers-api \
              "${subject}" \
              "target-${target}.json:application/json"
            HARBOR_REFS+=("${target}: ${subject}")
          done

          # Build index as a tagged OCI artifact under the builds project - the
          # Harbor home of what was the Artifactory build-index.json. Path
          # contract: builds/<image_name>:<build_id> (no namespace) - matches
          # docker-build-pipe run.sh + k8s-apps-config update-app-manifest.sh.
          harbor_build_index_ref="${HARBOR_HOST}/${HARBOR_BUILDS_PROJECT:-builds}/${IMAGE_NAME}:${BUILD_ID}"
          echo "push build index: ${harbor_build_index_ref}"
          oras push \
            --artifact-type application/vnd.landcareresearch.build-index+json \
            "${harbor_build_index_ref}" \
            build-index.json:application/json \
            bake.json:application/json
          echo "metadata_url=${harbor_build_index_ref}" >> "$GITHUB_OUTPUT"

          {
            echo "harbor_refs<<EOF"
            printf '%s\n' "${HARBOR_REFS[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build ID | \`${{ steps.vars.outputs.build_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ steps.vars.outputs.registry_prefix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build index | \`${{ steps.harbor.outputs.metadata_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          jq -r '.outputs[] | "- **\(.target)**: `\(.digest)`"' build-index.json >> $GITHUB_STEP_SUMMARY

          if [[ -n "${{ steps.harbor.outputs.harbor_refs }}" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Harbor (metadata attached)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.harbor.outputs.harbor_refs }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
